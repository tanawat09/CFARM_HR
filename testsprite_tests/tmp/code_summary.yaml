version: "2"
type: frontend
tech_stack:
  - PHP 8.4
  - Laravel 11
  - Inertia.js
  - Vue 3
  - Vite
  - TailwindCSS
routes:
  - path: /login
    file: resources/js/Pages/Auth/Login.vue
    auth_required: false
    description: User login page
  - path: /register
    file: resources/js/Pages/Auth/Register.vue
    auth_required: false
    description: User registration page
  - path: /dashboard
    file: resources/js/Pages/Dashboard/Admin.vue
    auth_required: true
    description: Admin dashboard with overall statistics
  - path: /profile
    file: resources/js/Pages/Profile/Edit.vue
    auth_required: true
    description: User profile editing page
  - path: /attendance/check-in-out
    file: resources/js/Pages/Attendance/Index.vue
    auth_required: true
    description: Attendance check-in and check-out page
  - path: /reports
    file: resources/js/Pages/Report/Index.vue
    auth_required: true
    description: Monthly attendance reports page
  - path: /leave
    file: resources/js/Pages/Leave/Index.vue
    auth_required: true
    description: Leave request management page
features:
  - name: User Authentication
    description: Login, Register, and Logout functionality
    files:
      - resources/js/Pages/Auth/Login.vue
      - resources/js/Pages/Auth/Register.vue
      - app/Http/Controllers/Auth/AuthenticatedSessionController.php
      - app/Http/Controllers/Auth/RegisteredUserController.php
    entry_route: /login
    user_interactions:
      - Navigate to /login or /register
      - Input username/email and password
      - Click Sign In or Register button
    api_calls:
      - method: POST
        endpoint: /login
      - method: POST
        endpoint: /register
    auth_required: false
  - name: Admin Dashboard
    description: View summarized attendance data and 7-day trends
    files:
      - resources/js/Pages/Dashboard/Admin.vue
      - app/Http/Controllers/DashboardController.php
    entry_route: /dashboard
    user_interactions:
      - View KPI cards for total employees, attendance, and leaves
      - View 7-Day Attendance Trend chart
      - View recent leave requests list
    auth_required: true
  - name: Attendance Management
    description: Recording check-in and check-out via web camera
    files:
      - resources/js/Pages/Attendance/Index.vue
      - app/Http/Controllers/AttendanceController.php
      - resources/js/Composables/useCamera.js
    entry_route: /attendance/check-in-out
    user_interactions:
      - Capture photo using web camera
      - Select check-in or check-out
      - Click submit button
    api_calls:
      - method: POST
        endpoint: /attendance/check-in
      - method: POST
        endpoint: /attendance/check-out
    auth_required: true
known_limitations: []
