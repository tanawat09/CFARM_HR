version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cfarm-hr-app:latest
    container_name: cfarm_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - cfarm-data-v2:/var/www
    networks:
      - cfarm-network

  webserver:
    image: nginx:alpine
    container_name: cfarm_nginx
    restart: unless-stopped
    ports:
      - "8018:80"
    volumes:
      - cfarm-data-v2:/var/www
    command: /bin/sh -c "cp /var/www/docker/nginx.conf /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app
    networks:
      - cfarm-network

networks:
  cfarm-network:
    driver: bridge

volumes:
  cfarm-data-v2:
