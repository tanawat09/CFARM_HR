version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: cfarm-hr-app
    container_name: cfarm_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/vendor
      - /var/www/public/build
    networks:
      - cfarm-network

  webserver:
    image: nginx:alpine
    container_name: cfarm_nginx
    restart: unless-stopped
    ports:
      - "8019:80"
    volumes:
      - ./:/var/www
      - /var/www/public/build
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - cfarm-network

networks:
  cfarm-network:
    driver: bridge
